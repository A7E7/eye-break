<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.38" r="0.65">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded-square app background -->
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#glow)"/>

  <!-- two eyes, looking up (👀 style) -->
  <g>
    <!-- left eye -->
    <ellipse cx="392" cy="520" rx="150" ry="186" fill="#f8fafc"/>
    <circle cx="392" cy="476" r="86" fill="#0b1120"/>
    <circle cx="362" cy="446" r="26" fill="#5eead4"/>

    <!-- right eye -->
    <ellipse cx="632" cy="520" rx="150" ry="186" fill="#f8fafc"/>
    <circle cx="632" cy="476" r="86" fill="#0b1120"/>
    <circle cx="602" cy="446" r="26" fill="#5eead4"/>
  </g>
</svg>
